{% extends "base.html" %}

{% block content %}

	<h1>{{ blog_name }}</h1>
	<div class="card mt-3">
		<div class="card body"></div>
	</div>
	<p>created by {{owner}} </p>
    
	<hr>

	<h2>latest blog posts</h2>
	{% if total_posts > 0 %}
	 {% for post in posts %}
	
		<h3>{{post}}</h3>
	
	{% endfor %}

	{% else %}

	<p>No blog posts available.</p>

{% endif %}


{% endblock %}
